#           key: ${{ secrets.EC2_SSH_KEY }}
#           script: |
#             cd ~/app
#             docker compose down
#             docker compose up -d --build

# ==========================================
# CÁCH 2: NHANH HƠN (BUILD TRÊN GITHUB ACTIONS -> PUSH LÊN DOCKER HUB -> EC2 CHỈ KÉO IMAGE VỀ CHẠY)
# ==========================================
  build_and_push:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    name: 1. Build & Push Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code (Lấy đúng SHA của luồng trước)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Đăng nhập Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PAT }}
          
      - name: Build và Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/crud_backend:${{ github.sha }},${{ secrets.DOCKER_USERNAME }}/crud_backend:latest
          
      - name: Build và Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/crud_frontend:${{ github.sha }},${{ secrets.DOCKER_USERNAME }}/crud_frontend:latest

  deploy_fast:
    name: 2. Deploy
    runs-on: ubuntu-latest
    needs: build_and_push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Copy duy nhất file docker-compose.yml lên EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml"
          target: "~/app"

      - name: Lệnh kéo Image và chạy trên EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          IMAGE_TAG: ${{ github.sha }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DOCKER_USERNAME, IMAGE_TAG
          script: |
            cd ~/app
            export DOCKER_USERNAME=$DOCKER_USERNAME
            export IMAGE_TAG=$IMAGE_TAG
            docker compose pull
            docker compose down
            docker compose up -d

  verify:
    name: 3. Verify / Smoke Test
    runs-on: ubuntu-latest
    needs: deploy_fast
    steps:
      - name: In log và kiểm tra Healthcheck
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/app
            echo "--- Danh sách Container đang chạy ---"
            docker ps
            
            echo "Đợi ứng dụng khởi động (10s)..."
            sleep 10
            echo "Smoke test trang chủ:"
            curl -f http://localhost:80 || exit 1
            echo "Triển khai thành công, ứng dụng đang sống!"
