name: CI/CD Pipeline Docker

# Concurrency: hủy luồng cũ nếu có luồng mới cùng nhóm
# Fix: Nhóm theo môi trường để tránh block chéo
concurrency:
  group: ${{ github.workflow }}-${{ env.DEPLOY_TARGET || 'production' }}
  cancel-in-progress: true

# Sử dụng workflow_run để file Deploy này chỉ chạy SAU KHI file CI chạy xong
on:
  workflow_run:
    workflows: ["CI - Build & Test"]
    types:
      - completed
    branches:
      - main

jobs:
# ==========================================
# CÁCH 1: CƠ BẢN (COPY TOÀN BỘ SOURCE CODE SANG EC2) - ĐÃ ĐƯỢC COMMENT LẠI
# ==========================================
