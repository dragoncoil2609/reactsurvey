name: Demo OIDC AWS
on: [workflow_dispatch]

permissions:
  id-token: write # Bắt buộc: Quyền xin token OIDC
  contents: read  # Quyền đọc code

jobs:
  test_oidc:
    runs-on: ubuntu-latest
    steps:
      - name: Cấu hình AWS Credentials qua OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }} # Lấy ARN của Role từ Secrets
          aws-region: ap-southeast-1
          
      - name: Thử gọi lệnh AWS CLI (Kiểm tra danh tính)
        run: |
          echo "Thử gọi API của AWS để xem đang dùng quyền của ai..."
          aws sts get-caller-identity
