version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: crud_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: '123456'
      MYSQL_DATABASE: 'crud_db'
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: crud_backend
    restart: always
    depends_on:
      - db
    environment:
      - DB_HOST=db       # Quan trọng: Trỏ host tới container 'db'
      - DB_USER=root
      - DB_PASSWORD=123456
      - DB_NAME=crud_db
      - PORT=3000
    ports:
      - "3000:3000"

  frontend:
    build: ./frontend
    container_name: crud_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  db_data:
