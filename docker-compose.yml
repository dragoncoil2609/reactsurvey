version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: crud_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: '123456'
      MYSQL_DATABASE: 'crud_db'
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    image: ${DOCKER_USERNAME:-dragoncoil2609}/crud_backend:${IMAGE_TAG:-latest}
    container_name: crud_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db       # Quan trọng: Trỏ host tới container 'db'
      - DB_USER=root
      - DB_PASSWORD=123456
      - DB_NAME=crud_db
      - PORT=3000
    ports:
      - "3000:3000"

  frontend:
    build: ./frontend
    image: ${DOCKER_USERNAME:-dragoncoil2609}/crud_frontend:${IMAGE_TAG:-latest}
    container_name: crud_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  db_data:
